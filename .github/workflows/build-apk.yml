name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "kaf.audiobookshelfwearos"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Gradle Wrapper (version from wrapper properties)
        run: gradle wrapper --gradle-version 8.13

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoTestReport
          retention-days: 7

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  instrumented-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "kaf.audiobookshelfwearos"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Gradle Wrapper (version from wrapper properties)
        run: gradle wrapper --gradle-version 8.13

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: List available Wear OS system images
        run: |
          echo "=== environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          which sdkmanager || echo "sdkmanager not on PATH"
          echo "=== locating sdkmanager binary directly ==="
          SDKMANAGER=$(find /usr/local/lib/android/sdk/cmdline-tools -name sdkmanager 2>/dev/null | head -1)
          echo "Using: $SDKMANAGER"
          echo "=== accepting licenses first ==="
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          echo "=== total line count of --list output (sanity check) ==="
          "$SDKMANAGER" --list 2>&1 | wc -l
          echo "=== grep 'wear' (any case), stdout+stderr, no --list filtering ==="
          "$SDKMANAGER" --list 2>&1 | grep -i "wear" || echo "none"
          echo "=== grep 'wear' across --list --include_obsolete ==="
          "$SDKMANAGER" --list --include_obsolete 2>&1 | grep -i "wear" || echo "none"
          echo "=== sample of system-images lines (first 40) ==="
          "$SDKMANAGER" --list 2>&1 | grep "system-images" | head -40

      - name: Run instrumented smoke test on a Wear OS emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: android-wear
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
