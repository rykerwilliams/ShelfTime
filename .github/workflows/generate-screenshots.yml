name: Generate Screenshots

on:
  workflow_dispatch:

jobs:
  generate-screenshots:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "kaf.audiobookshelfwearos"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Gradle Wrapper (version from wrapper properties)
        run: gradle wrapper --gradle-version 8.13

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run the screenshot walk on a Wear OS emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: android-wear
          arch: x86_64
          script: |
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell wm dismiss-keyguard
            adb logcat -c
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=kaf.audiobookshelfwearos.app.screenshots.ScreenshotWalkTest
            mkdir -p docs/screenshots
            echo "===== logcat: ScreenshotWalkTest tag ====="
            adb logcat -d | grep -i "ScreenshotWalkTest" || echo "(no matching logcat lines)"
            # Confirmed via the logcat dump above that the app itself writes
            # successfully to /storage/emulated/0/Android/data/<pkg>/files/screenshots/.
            # Scoped storage (Android 11+) blocks shell/root from directly
            # listing or pulling another app's /Android/data subtree -- even
            # `adb root` couldn't see it in an earlier diagnostic run. The
            # supported workaround is running the read as the app itself via
            # `run-as`, streamed out as a tar so adb pull's per-file overhead
            # (and its inability to use run-as at all) doesn't matter.
            echo "===== pulling screenshots via run-as + tar ====="
            adb exec-out run-as kaf.audiobookshelfwearos tar -cf - -C /storage/emulated/0/Android/data/kaf.audiobookshelfwearos/files/screenshots . > /tmp/screenshots.tar 2>/tmp/screenshots_tar_err.txt
            tar -tf /tmp/screenshots.tar >/dev/null 2>&1 && tar -xf /tmp/screenshots.tar -C docs/screenshots/ || { echo "run-as tar pull failed or produced an empty archive; stderr:"; cat /tmp/screenshots_tar_err.txt; }
            echo "===== docs/screenshots contents ====="
            ls -la docs/screenshots/ || true

      - name: Commit and push screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "Update auto-generated screenshots"
            git push
          fi
