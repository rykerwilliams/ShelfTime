name: Generate Screenshots

on:
  workflow_dispatch:

jobs:
  generate-screenshots:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "kaf.audiobookshelfwearos"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Gradle Wrapper (version from wrapper properties)
        run: gradle wrapper --gradle-version 8.13

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run the screenshot walk on a Wear OS emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: android-wear
          arch: x86_64
          script: |
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell wm dismiss-keyguard
            adb logcat -c
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=kaf.audiobookshelfwearos.app.screenshots.ScreenshotWalkTest
            mkdir -p docs/screenshots
            echo "===== logcat: ScreenshotWalkTest tag ====="
            adb logcat -d | grep -i "ScreenshotWalkTest" || echo "(no matching logcat lines)"
            echo "===== adb root ====="
            adb root || true
            sleep 2
            echo "===== ls -la / (top-level, in case getExternalFilesDir fell back to a relative path) ====="
            adb shell ls -la / 2>&1 || true
            echo "===== find *.png under /data (requires root) ====="
            adb shell find /data -iname "*.png" 2>&1 || true
            echo "===== find *.png under /sdcard ====="
            adb shell find /sdcard -iname "*.png" 2>&1 || true
            echo "===== find *.png under /storage ====="
            adb shell find /storage -iname "*.png" 2>&1 || true
            echo "===== attempting pull from private app files dir ====="
            adb pull /data/data/kaf.audiobookshelfwearos/files/screenshots/. docs/screenshots/ || echo "pull from /data path failed"
            echo "===== attempting pull from assumed external files dir ====="
            adb pull /sdcard/Android/data/kaf.audiobookshelfwearos/files/screenshots/. docs/screenshots/ || echo "pull from /sdcard path failed"

      - name: Commit and push screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "Update auto-generated screenshots"
            git push
          fi
