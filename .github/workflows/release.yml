name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.14) — tag vX.Y will be created and pushed"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "kaf.audiobookshelfwearos"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Gradle Wrapper (version from wrapper properties)
        run: gradle wrapper --gradle-version 8.13

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/ShelfTime-${{ steps.release_tag.outputs.tag }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ShelfTime ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/ShelfTime-${{ steps.release_tag.outputs.tag }}.apk
          body: |
            Not signed for the Play Store — this is a debug build for sideloading.
            See [SIDELOADING.md](https://github.com/${{ github.repository }}/blob/main/SIDELOADING.md) for install instructions.
