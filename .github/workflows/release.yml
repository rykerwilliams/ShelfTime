name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "kaf.audiobookshelfwearos"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Generate Gradle Wrapper (version from wrapper properties)
        run: gradle wrapper --gradle-version 8.13

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ShelfTime-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ShelfTime ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/ShelfTime-${{ github.ref_name }}.apk
          body: |
            Not signed for the Play Store — this is a debug build for sideloading.
            See [SIDELOADING.md](https://github.com/${{ github.repository }}/blob/main/SIDELOADING.md) for install instructions.
